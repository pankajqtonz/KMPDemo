name: iOS Device Cloud Upload (BrowserStack)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "composeApp/**"
      - "iosApp/**"
      - "gradle/**"
      - "*.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/ios-browserstack-upload.yml"

jobs:
  build-and-upload:
    name: Build signed IPA and upload
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Validate required secrets
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          missing=0
          for name in \
            BROWSERSTACK_USERNAME \
            BROWSERSTACK_ACCESS_KEY \
            IOS_CERTIFICATE_P12_BASE64 \
            IOS_CERTIFICATE_PASSWORD \
            IOS_PROVISIONING_PROFILE_BASE64 \
            IOS_TEAM_ID \
            IOS_BUNDLE_ID \
            IOS_PROVISIONING_PROFILE_NAME
          do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required secret: ${name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Kotlin iOS release framework
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64 --stacktrace

      - name: Decode and validate signing assets
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/signing_cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          printf '%s' "$IOS_CERTIFICATE_P12_BASE64" | tr -d '\r\n' | base64 -D > "$CERT_PATH"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | tr -d '\r\n' | base64 -D > "$PROFILE_PATH"

          openssl pkcs12 -in "$CERT_PATH" -noout -passin "pass:$IOS_CERTIFICATE_PASSWORD" >/dev/null

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/profile.mobileprovision"

      - name: Import Apple signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-filepath: ${{ runner.temp }}/signing_cert.p12
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Archive iOS app
        working-directory: iosApp
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
            -destination "generic/platform=iOS" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_NAME" \
            clean archive

      - name: Create export options plist
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${IOS_PROVISIONING_PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
            -exportPath "$RUNNER_TEMP/exported" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/exported/*.ipa

      - name: Upload app to BrowserStack
        id: browserstack_upload
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: |
          set -euo pipefail
          IPA_PATH="$(ls "$RUNNER_TEMP"/exported/*.ipa | head -n 1)"
          RESPONSE_JSON="$(curl -sS -u "${BROWSERSTACK_USERNAME}:${BROWSERSTACK_ACCESS_KEY}" \
            -X POST "https://api-cloud.browserstack.com/app-live/upload" \
            -F "file=@${IPA_PATH}" \
            -F "custom_id=kmpdemo-ios-latest")"

          APP_URL="$(echo "$RESPONSE_JSON" | sed -n 's/.*"app_url":"\([^"]*\)".*/\1/p')"

          if [ -z "$APP_URL" ]; then
            echo "::error::BrowserStack upload failed. Response: $RESPONSE_JSON"
            exit 1
          fi

          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"
          echo "Uploaded app_url: $APP_URL"

      - name: Publish BrowserStack links
        run: |
          echo "## BrowserStack Upload Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- BrowserStack app_url: \`${{ steps.browserstack_upload.outputs.app_url }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Open App Live dashboard: https://app-live.browserstack.com/dashboard" >> "$GITHUB_STEP_SUMMARY"
          echo "- Uploaded as custom id: \`kmpdemo-ios-latest\`" >> "$GITHUB_STEP_SUMMARY"
