name: iOS CI

on:
  pull_request:
    paths:
      - "composeApp/**"
      - "iosApp/**"
      - "gradle/**"
      - "*.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/ios-ci.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "composeApp/**"
      - "iosApp/**"
      - "gradle/**"
      - "*.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/ios-ci.yml"
  workflow_dispatch:

jobs:
  ios-build:
    name: Build iOS (Framework + Xcode)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Kotlin iOS framework
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64 --stacktrace

      - name: Build iOS app for simulator (no signing)
        working-directory: iosApp
        run: |
          xcodebuild \
            -project iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build
